# 作用：quality 档位相机参数（设备默认最高分辨率，开启点云）
---
orbbec_ros:
  camera_parameters:
    color:
      enable_color: true
      color_width: 0
      color_height: 0
      color_fps: 0
    depth:
      enable_depth: true
      depth_width: 0
      depth_height: 0
      depth_fps: 0
      depth_registration: true
      align_mode: "SW"
    point_cloud:
      enable_point_cloud: true
